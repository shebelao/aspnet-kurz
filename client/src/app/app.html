
<h2 class="text-3xl font-bold  text-blue-500 ml-25">{{title}}</h2>
<div class="card bg-orange-100 w-1/4 mx-10 p-5 ml-25 shadow-2xl text-purple-800">
    <ul class="list">
        @for (member of members(); track member.id) {
            <li class="list-row items-center">
                <img src="/user.png" alt="user avatar" class="size-12" rounded-box>
                {{member.displayName}} - {{member.email}}
            </li>
        }
    </ul>
</div>


<button class="btn btn-lg btn-outline ">CLICK</button>
