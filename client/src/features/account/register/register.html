<div class="card bd-base-100 w-auto mx-auto flex flex-col p-6 rounded-lg shadow-2xl">
    <div class="card-title justify-center text-3xl text-rose-950">
        Sign up
    </div>
        <div class="card-body w-full">
            <form #registerForm="ngForm" class="flex flex-col gap-4 w-full" (ngSubmit)="register()">
                <input type="text" class="input w-full" name="email" [(ngModel)]="creds.email" placeholder="Email">
                <input type="text" class="input w-full" name="dispalyName" [(ngModel)]="creds.displayName" placeholder="Name">
                <input type="password" class="input w-full" name="password" [(ngModel)]="creds.password" placeholder="Password">

                <div class="flex items-center justify-end gap-3">
                    <button (click)="cancel()" type="button" class=btn>Cancel</button>
                    <button class="btn btn-ghost" type="submit">Register</button>

                </div>
            </form>
        </div>
</div>
